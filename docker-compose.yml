version: "3.9"

services:
  # -------------------------
  # API GATEWAY
  # -------------------------
  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    container_name: gateway
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=${GATEWAY_PORT}
      - NODE_ENV=${NODE_ENV}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - CONTENT_SERVICE_URL=${CONTENT_SERVICE_URL}
      - AI_SERVICE_URL=${AI_SERVICE_URL}
      - PROGRESS_SERVICE_URL=${PROGRESS_SERVICE_URL}
      - INNGEST_API_KEY=${INNGEST_API_KEY}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
    depends_on:
      auth-service:
        condition: service_started
      content-service:
        condition: service_started
      progress-service:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------
  # AUTH SERVICE
  # -------------------------
  auth-service:
    build:
      context: .
      dockerfile: infra/docker/auth.Dockerfile
    container_name: auth-service
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - PORT=${AUTH_PORT}
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${AUTH_DATABASE_URL}
      - GATEWAY_URL=${GATEWAY_URL}
      - CHILD_LOGIN_CODE_ALPHABET=${CHILD_LOGIN_CODE_ALPHABET}
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------
  # CONTENT SERVICE
  # -------------------------
  content-service:
    build:
      context: .
      dockerfile: infra/docker/content.Dockerfile
    container_name: content-service
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - PORT=${CONTENT_PORT}  
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${CONTENT_DATABASE_URL}
      - DEEPL_API_KEY=${DEEPL_API_KEY}
      - ENABLE_AUTO_TRANSLATION=${ENABLE_AUTO_TRANSLATION}
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------
  # PROGRESS SERVICE
  # -------------------------
  progress-service:
    build:
      context: .
      dockerfile: infra/docker/progress.Dockerfile
    container_name: progress-service
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - PORT=${PROGRESS_PORT}
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${PROGRESS_DATABASE_URL}
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------
  # AI SERVICE
  # -------------------------
  ai-service:
    build:
      context: .
      dockerfile: infra/docker/ai.Dockerfile
    container_name: ai-service
    ports:
      - "3005:3005"
    env_file:
      - .env
    environment:
      - PORT=${AI_PORT}
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${AI_DATABASE_URL}
      - GOOGLE_PROJECT_ID=${GOOGLE_PROJECT_ID}
      - UPLOADTHING_TOKEN=${UPLOADTHING_TOKEN}
      - SERVICE_ACCOUNT_KEY=${SERVICE_ACCOUNT_KEY}
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# -------------------------
# NETWORK
# -------------------------
networks:
  story-network:
    driver: bridge
