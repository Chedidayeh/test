version: "3.9"

services:
  # -------------------------
  # API GATEWAY
  # -------------------------
  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    container_name: gateway
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=development
      - LOG_LEVEL=info
      - AUTH_SERVICE_URL=http://auth-service:3002
      - CONTENT_SERVICE_URL=http://content-service:3003
      - PROGRESS_SERVICE_URL=http://progress-service:3004
      - JWT_EXPIRATION=604800
    depends_on:
      auth-service:
        condition: service_started
      content-service:
        condition: service_started
      progress-service:
        condition: service_started
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------
  # AUTH SERVICE
  # -------------------------
  auth-service:
    build:
      context: .
      dockerfile: infra/docker/auth.Dockerfile
    container_name: auth-service
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - PORT=3002
      - NODE_ENV=development
      - DATABASE_URL=postgresql://neondb_owner:npg_nfUFjW4pRE9a@ep-misty-bar-agnfqnlj-pooler.c-2.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=auth-schema
      - JWT_EXPIRATION=604800
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------
  # CONTENT SERVICE
  # -------------------------
  content-service:
    build:
      context: .
      dockerfile: infra/docker/content.Dockerfile
    container_name: content-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=development
      - DATABASE_URL=postgresql://neondb_owner:npg_nfUFjW4pRE9a@ep-misty-bar-agnfqnlj-pooler.c-2.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=content-schema
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------
  # PROGRESS SERVICE
  # -------------------------
  progress-service:
    build:
      context: .
      dockerfile: infra/docker/progress.Dockerfile
    container_name: progress-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=development
      - DATABASE_URL=postgresql://neondb_owner:npg_nfUFjW4pRE9a@ep-misty-bar-agnfqnlj-pooler.c-2.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=progress-schema
    networks:
      - story-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# -------------------------
# NETWORK
# -------------------------
networks:
  story-network:
    driver: bridge
